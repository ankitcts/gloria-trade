version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: gloria-trade-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: gloria_admin
      MONGO_INITDB_ROOT_PASSWORD: gloria_secret_dev
      MONGO_INITDB_DATABASE: gloria_trade
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: gloria-trade-mongo-ui
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: gloria_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: gloria_secret_dev
      ME_CONFIG_MONGODB_URL: mongodb://gloria_admin:gloria_secret_dev@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
